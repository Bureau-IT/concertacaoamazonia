user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# Configuração de eventos
events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

# Configuração HTTP
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Formato de log
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # Logs
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Configurações de performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Configurações de buffer
    client_body_buffer_size 128K;
    client_header_buffer_size 4k;
    client_max_body_size 100M;
    large_client_header_buffers 8 16k;

    # Configurações de timeout
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;

    # Compressão Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Configurações de segurança
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Resolver DNS do Docker (necessário para resolução dinâmica)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # AVIF/WebP automatic delivery via try_files cascade.
    # AVIF preferido (>95% browser support em 2026, ~25% menor que WebP);
    # WebP como fallback (Safari < 16); raster para sem-suporte.
    #
    # Uso de strings raras (não-existentes) para suffix vazio: garante que
    # try_files $uri$suffix nunca casa no raster acidentalmente quando o
    # suffix está vazio (browser sem suporte). O nginx try_files se compromete
    # com o primeiro file existente — se $suffix="" $uri$suffix vira $uri, que
    # SEMPRE existe (raster), curto-circuitando a cascata. Solução: suffix
    # vazio vira ".__no__" que nunca existe; cascata segue normal até o final.
    map $http_accept $avif_suffix {
        default        ".__no__";
        "~*image/avif" ".avif";
    }
    map $http_accept $webp_suffix {
        default        ".__no__";
        "~*image/webp" ".webp";
    }

    # MIME type AVIF (webp ja vem no mime.types padrao do nginx)
    types {
        image/avif avif;
    }

    # Incluir configurações dos sites
    include /etc/nginx/conf.d/*.conf;
}