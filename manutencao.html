<html lang="pt-BR"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Em Manutenção — Uma Concertação Pela Amazônia</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0f0e8; color: #0b4334; min-height: 100vh; display: flex; flex-direction: column; }
  header { padding: 28px 52px; display: flex; align-items: center; }
  header img { height: 56px; width: auto; }
  main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; align-items: center; min-height: 0; }
  .left { display: flex; align-items: center; justify-content: center; padding: 20px 0 20px 0; overflow: hidden; }
  .spiral-bg { width: min(480px, 95%); height: auto; color: #c8d84b; animation: spin-ccw 60s linear infinite; transform-origin: center; }
  @keyframes spin-ccw { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
  .right { display: flex; flex-direction: column; justify-content: center; padding: 40px 64px 40px 20px; }
  .eyebrow { font-size: 12px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 18px; opacity: 0.55; }
  h1 { font-size: clamp(34px, 4.5vw, 56px); font-weight: 800; text-transform: uppercase; line-height: 1.0; letter-spacing: -0.5px; }
  .divider { width: 220px; height: 2px; background: #0b4334; opacity: 0.18; margin: 22px 0; }
  p { font-size: 15px; line-height: 1.75; opacity: 0.72; max-width: 380px; margin-bottom: 32px; }
  .status { display: flex; align-items: center; gap: 8px; margin-top: 4px; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.5; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #0b4334; animation: blink 1.4s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  footer { padding: 14px 52px; font-size: 11px; border-top: 1px solid rgba(11,67,52,0.1); display: flex; align-items: center; justify-content: space-between; }
  .footer-copy { opacity: 0.35; }
  /* Bureau IT - Hover Animation + CLI-CK Sound */
  .footer__developed-by-link { display: inline-flex; align-items: center; gap: 4px; font-family: system-ui, -apple-system, sans-serif; font-size: 10px; color: #7e8e91; cursor: pointer; user-select: none; text-decoration: none; }
  .footer__developed-by-link span { transition: color 0.2s; }
  .footer__developed-by-link:hover { color: #c8d84b; }
  .footer__developed-by-link .bureau-logo { height: 34px; width: auto; }
  .footer__developed-by-link .bureau-logo path:not(.bureau-arrow),
  .footer__developed-by-link .bureau-logo polygon:not(.bureau-arrow),
  .footer__developed-by-link .bureau-logo rect { fill: #7e8e91; transition: fill 0.2s; }
  .footer__developed-by-link:hover .bureau-logo path:not(.bureau-arrow),
  .footer__developed-by-link:hover .bureau-logo polygon:not(.bureau-arrow),
  .footer__developed-by-link:hover .bureau-logo rect { fill: #c8d84b; }
  .footer__developed-by-link .bureau-arrow { fill: #c8d84b; transition: fill 0.2s; transform-origin: center center; transform-box: fill-box; }
  .footer__developed-by-link:hover .bureau-arrow { fill: #7e8e91; }
  @keyframes blink-underscore { 0%,100%{opacity:1} 25%{opacity:0} 50%{opacity:1} 75%{opacity:0} }
  @keyframes arrow-click { 0%{transform:scale(1) translateY(0)} 40%{transform:scale(.85) translateY(4px)} 70%{transform:scale(1.05) translateY(-2px)} 100%{transform:scale(1) translateY(0)} }
  .bureau-underscore.animate-blink { animation: blink-underscore 0.6s ease-in-out; }
  .bureau-arrow.animate-click { animation: arrow-click 0.3s ease-out; }
  @media (max-width: 680px) { main { grid-template-columns: 1fr; } .left { display: none; } .right { padding: 40px 28px; } }
</style>
