# sync-elementor-templates.conf
# Grupos de sincronização de templates Header/Footer do Elementor Theme Builder
#
# Formato:
#   SOURCE_<grupo>|<container>|<wp_url>
#   TMPL_<grupo>|header|<id_origem>
#   TMPL_<grupo>|footer|<id_origem>
#   TARGET_<grupo>|<container>|<wp_url>|header=<id>|footer=<id>
#
# ID=0 → cria novo post elementor_library
# Cada grupo tem um SOURCE, N templates TMPL_, e N TARGETs.

# ── www2-concertacao (8484) ───────────────────────────────────────────────────
# Fonte: site principal (blog_id=1)
SOURCE_www2|www2-concertacao-dev-wordpress|https://cambrasmax.local:8484/

# Templates do site principal (PT)
TMPL_www2|header|39359
TMPL_www2|footer|72234

# Templates do site principal (EN)
TMPL_www2|header-en|74155
TMPL_www2|footer-en|72921

# Target 1: subsite /cultura/ (blog_id=2) — mesmo container, URL diferente
TARGET_www2|www2-concertacao-dev-wordpress|https://cambrasmax.local:8484/cultura/|header=89307|footer=89361|header-en=89553|footer-en=89785

# Target 2: site www-concertacao (porta 8490) — container diferente — site principal
TARGET_www2|www-concertacao-dev-wordpress|https://cambrasmax.local:8490/|header=509|footer=53

# Target 3: subsite /5anos/
TARGET_www2|www-concertacao-dev-wordpress|https://cambrasmax.local:8490/5anos/|header=327|footer=328

# Target 4: subsite /rota26-30/
TARGET_www2|www-concertacao-dev-wordpress|https://cambrasmax.local:8490/rota26-30/|header=22|footer=23

# Target 5: subsite /100-dias/
TARGET_www2|www-concertacao-dev-wordpress|https://cambrasmax.local:8490/100-dias/|header=34190|footer=34191
