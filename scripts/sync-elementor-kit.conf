# sync-elementor-kit.conf
# Grupos de sincronização do Elementor Kit (cores e fontes globais)
#
# Formato:
#   SOURCE_<grupo>|<container>|<wp_url>|<kit_id>
#   TARGET_<grupo>|<container>|<wp_url>|<kit_id>
#
# Cada grupo tem um SOURCE (origem) e N TARGETs (destinos).

# ── www2-concertacao (8484) ───────────────────────────────────────────────────
SOURCE_www2|www2-concertacao-dev-wordpress|https://cambrasmax.local:8484/|2553
TARGET_www2|www2-concertacao-dev-wordpress|https://cambrasmax.local:8484/cultura/|5

# ── www-concertacao (8490) — removido: subsites têm identidade própria ───────
# SOURCE_www|www-concertacao-dev-wordpress|https://cambrasmax.local:8490/|5
